const Inp = ({ label, value, onChange, placeholder, type = "text" }) => (
  <div>

      type={type === "number" ? "text" : type}

      placeholder={placeholder || ""}
    />
  </div>
);

// Champ numérique — non-contrôlé (uncontrolled) pour éviter
// toute interférence de React pendant la frappe.
const NumInp = ({ label, value, onChange, placeholder }) => {
  const ref = useRef(null);

  // Sync la valeur affichée seulement quand value change ET que le champ
  // n'est pas en cours d'édition.
  useEffect(() => {
    if (ref.current && ref.current !== document.activeElement) {
      ref.current.value = (value === 0 || value === "") ? "" : String(value);
    }
  }, [value]);

  const handleChange = (e) => {
    // Remplace virgule par point en live sans bouger le curseur
    const v = e.target.value;
    const replaced = v.replace(",", ".");
    if (v !== replaced) {
      const pos = e.target.selectionStart;
      e.target.value = replaced;
      e.target.setSelectionRange(pos, pos);
    }
    // Rejette tout caractère invalide
    if (!/^-?\d*\.?\d*$/.test(e.target.value)) {
      e.target.value = v.replace(",", ".");
    }
  };

  const handleBlur = (e) => {
    const n = parseFloat(e.target.value);
    if (!isNaN(n)) {
      onChange(n);
      e.target.value = String(n);
    } else {
      e.target.value = (value === 0 || value === "") ? "" : String(value);
    }
  };

  return (
    <div>
      {label && <label style={G.label}>{label}</label>}
      <input
        ref={ref}
        type="text"
        inputMode="decimal"
        style={G.input}
        defaultValue={(value === 0 || value === "") ? "" : String(value)}
        onChange={handleChange}
        onBlur={handleBlur}
        placeholder={placeholder || "0"}
      />
    </div>
  );
};

const STORAGE_KEY = "duplex_ahuntsic_v3";

function DuplexApp() {
  const [tab, setTab] = useState("tableau");
  const [budget, setBudget] = useState(INIT_BUDGET);
  const [hyp, setHyp] = useState(INIT_HYP);
  const [loc, setLoc] = useState(INIT_LOC);
  const [hydro, setHydro] = useState(INIT_HYDRO);
  const [travaux, setTravaux] = useState(INIT_TRAVAUX);
  const [docs, setDocs] = useState(INIT_DOCS);
  const [savedMsg, setSavedMsg] = useState("⏳ Chargement...");
  const [loaded, setLoaded] = useState(false);
  const [showBackup, setShowBackup] = useState(false);
  const [backupText, setBackupText] = useState("");

  // ── Chargement initial depuis localStorage ──
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (d.budget)  setBudget(d.budget);
        if (d.hyp)     setHyp(d.hyp);
        if (d.loc)     setLoc(d.loc);
        if (d.hydro)   setHydro(d.hydro);
        if (d.travaux) setTravaux(d.travaux);
        if (d.docs)    setDocs(d.docs);
        setSavedMsg("✓ Données chargées");
      } else {
        setSavedMsg("");
      }
    } catch { setSavedMsg(""); }
    setLoaded(true);
  }, []);

  // ── Sauvegarde automatique dans localStorage ──
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ budget, hyp, loc, hydro, travaux, docs }));
      setSavedMsg("✓ Sauvegardé");
      setTimeout(() => setSavedMsg(""), 2000);
    } catch { setSavedMsg("⚠ Erreur sauvegarde"); }
  }, [budget, hyp, loc, hydro, travaux, docs]);

  // ── Export : affiche le JSON à copier ──
  const exportData = () => {
    const data = JSON.stringify({ budget, hyp, loc, hydro, travaux, docs }, null, 2);
    setBackupText(data);
    setShowBackup(true);
  };

  // ── Import : lit le JSON collé ──
  const importData = () => {
    try {
      const d = JSON.parse(backupText);
      if (d.budget)  setBudget(d.budget);
      if (d.hyp)     setHyp(d.hyp);
      if (d.loc)     setLoc(d.loc);
      if (d.hydro)   setHydro(d.hydro);
      if (d.travaux) setTravaux(d.travaux);
      if (d.docs)    setDocs(d.docs);
      setShowBackup(false);
      setBackupText("");
      setSavedMsg("✓ Données importées!");
      setTimeout(() => setSavedMsg(""), 2500);
    } catch { setSavedMsg("⚠ JSON invalide"); }
  };

  // ── Réinitialiser ──
  const resetAll = () => {
    if (!window.confirm("Réinitialiser toutes les données aux valeurs par défaut?")) return;
    setBudget(INIT_BUDGET); setHyp(INIT_HYP); setLoc(INIT_LOC);
    setHydro(INIT_HYDRO); setTravaux(INIT_TRAVAUX); setDocs(INIT_DOCS);
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
  };

  const [newTravail, setNT] = useState({ titre: "", cat: "Plomberie", date: today(), cout: "", statut: "Planifié", entrepreneur: "", notes: "", logement: "commun", garantie: "", deductible: true });
  const [showTF, setSTF] = useState(false);
  const [filterStatut, setFS] = useState("Tous");

  const [newDoc, setND] = useState({ nom: "", type: "Bail", dateExpiration: "", alerte: false, notes: "" });
  const [showDF, setSDF] = useState(false);

  const [newPaie, setNP] = useState({ mois: today().slice(0, 7), montant: 1500, statut: "Payé", note: "" });
  const [newHausse, setNH] = useState({ annee: new Date().getFullYear(), loyerAvant: 1500, loyerApres: "", dateAvis: today() });
  const [newHydro, setNHydro] = useState({ mois: today().slice(0, 7), haut: "", bas: "" });
  const totalRev = budget.revenus.reduce((s, r) => s + (+r.montant || 0), 0);
  const totalDep = budget.depenses.reduce((s, d) => s + (+d.montant || 0), 0);
  const cashflow = totalRev - totalDep;

  // Hyp calcs
  const hypCalc = useMemo(() => {
    const P = hyp.solde, r = hyp.taux / 100 / 12, n = hyp.amortissement * 12;
    const pmt = r > 0 ? P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1) : P / n;
    let solde = P, table = [];
    for (let y = 1; y <= Math.min(10, hyp.amortissement); y++) {
      let intAn = 0, capAn = 0;
      for (let m = 0; m < 12; m++) {
        const i = solde * r; intAn += i; capAn += (pmt - i); solde -= (pmt - i);
      }
      table.push({ annee: y, pmt: pmt * 12, interet: intAn, capital: capAn, solde: Math.max(solde, 0) });
    }
    return { pmt, capitalAn1: table[0]?.capital || 0, interetAn1: table[0]?.interet || 0, valeurNette: hyp.valeurMarchande - hyp.solde, table };
  }, [hyp]);

  // Fiscal calcs
  const fiscal = useMemo(() => {
    const depAn = totalDep * 12;
    return {
      depAn,
      deductible: depAn * 0.5,
      travauxDed: travaux.filter(t => t.statut === "Terminé" && t.deductible).reduce((s, t) => s + (+t.cout || 0), 0),
    };
  }, [totalDep, travaux]);

  // Taxe bienvenue
  const taxeBienvenue = useMemo(() => {
    const v = hyp.valeurMarchande;
    let t = 0;
    t += Math.min(v, 58900) * 0.005;
    if (v > 58900) t += Math.min(v - 58900, 235100) * 0.01;
    if (v > 294000) t += Math.min(v - 294000, 206000) * 0.015;
    if (v > 500000) t += Math.min(v - 500000, 500000) * 0.02;
    if (v > 1000000) t += (v - 1000000) * 0.025;
    return t;
  }, [hyp.valeurMarchande]);

  // Taxes Ahuntsic-Cartierville 2025 (taux officiels Ville de Montréal)
  const taxesAhuntsic = useMemo(() => {
    const v = hyp.valeurMarchande;
    // Taux conseil municipal résidentiel ($/100$)
    const fonciere   = v * 0.4638 / 100;
    const artm       = v * 0.0072 / 100;
    const voirie     = v * 0.0024 / 100;
    // Taxes arrondissement Ahuntsic-Cartierville
    const services   = v * 0.0422 / 100;
    const invest     = v * 0.0306 / 100;
    const municipal  = fonciere + artm + voirie + services + invest;
    // Taxe scolaire 2025-2026 (exemption 25 000$, taux 0.08423$/100$)
    const scolaire   = Math.max(v - 25000, 0) * 0.08423 / 100;
    const total      = municipal + scolaire;
    return {
      fonciere, artm, voirie, services, invest, municipal, scolaire, total,
      // 50% locatif
      municipalDed: municipal * 0.5,
      scolaireDed:  scolaire  * 0.5,
      totalDed:     total     * 0.5,
      // économies fiscales estimées
      eco37: total * 0.5 * 0.37,
      eco45: total * 0.5 * 0.45,
      eco53: total * 0.5 * 0.53,
    };
  }, [hyp.valeurMarchande]);

  const daysUntil = (d) => d ? Math.ceil((new Date(d) - new Date()) / 86400000) : null;
  const alertDocs = docs.filter(d => d.alerte && d.dateExpiration && daysUntil(d.dateExpiration) !== null && daysUntil(d.dateExpiration) <= 90 && daysUntil(d.dateExpiration) >= 0);
  const loysEnRetard = loc.paiements.filter(p => p.statut === "En retard");

  // Budget helpers
  const updB = (type, id, field, val) => setBudget(p => ({
    ...p, [type]: p[type].map(i => i.id === id ? { ...i, [field]: val } : i)
  }));
  const addBI = (type) => setBudget(p => ({ ...p, [type]: [...p[type], { id: Date.now(), label: "Nouveau poste", montant: 0, cat: "divers" }] }));
  const delBI = (type, id) => setBudget(p => ({ ...p, [type]: p[type].filter(i => i.id !== id) }));

  const addTravail = () => {
    if (!newTravail.titre) return;
    setTravaux(p => [...p, { ...newTravail, id: Date.now(), cout: +newTravail.cout || 0 }]);
    setNT({ titre: "", cat: "Plomberie", date: today(), cout: "", statut: "Planifié", entrepreneur: "", notes: "", logement: "commun", garantie: "", deductible: true });
    setSTF(false);
  };

  const addDoc = () => {
    if (!newDoc.nom) return;
    setDocs(p => [...p, { ...newDoc, id: Date.now() }]);
    setND({ nom: "", type: "Bail", dateExpiration: "", alerte: false, notes: "" });
    setSDF(false);
  };

  const TABS = [
    ["tableau", "🏠 Tableau de bord"],
    ["budget", "💰 Budget"],
    ["hypotheque", "🏦 Hypothèque"],
    ["locataire", "👥 Locataire"],
    ["travaux", "🔧 Travaux"],
    ["energie", "⚡ Énergie"],
    ["fiscal", "🧾 Fiscal"],
    ["documents", "📋 Documents"],
    ["offres", "🔍 Meilleures offres"],
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "Georgia, 'Times New Roman', serif", paddingBottom: 60 }}>

      {/* HEADER */}
      <div style={{ background: `linear-gradient(160deg, ${C.surface2} 0%, ${C.bg} 100%)`, borderBottom: `1px solid ${C.border}`, padding: "22px 24px 0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
          <div style={{ width: 44, height: 44, background: `linear-gradient(135deg, ${C.gold}, ${C.goldLight})`, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>🏘</div>
          <div>
            <div style={{ fontSize: 20, color: C.text }}>Duplex Ahuntsic</div>
            <div style={{ fontSize: 11, color: C.textMuted, fontFamily: "monospace", letterSpacing: "0.1em" }}>GESTION IMMOBILIÈRE · 2 LOGEMENTS</div>
          </div>

          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            {/* Indicateur sauvegarde */}
            {savedMsg && (
              <span style={{ fontSize: 11, color: C.green, fontFamily: "monospace", transition: "opacity 0.3s" }}>{savedMsg}</span>
            )}

            {/* Alertes */}
            {alertDocs.length > 0 && <div style={{ background: `${C.orange}18`, border: `1px solid ${C.orange}40`, borderRadius: 7, padding: "5px 12px", fontSize: 11, color: C.orange, fontFamily: "monospace" }}>⚠ {alertDocs.length} doc{alertDocs.length > 1 ? "s" : ""}</div>}

                  const pct = Math.round((total / max) * 100);
                  return (
                    <div key={h.mois} style={{ marginBottom: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.textMuted, marginBottom: 5 }}>
                        <span>{h.mois}</span><span style={{ color: C.gold }}>{fmt(total)}</span>
                      </div>
                      <div style={{ height: 8, background: C.surface2, borderRadius: 4, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${pct}%`, background: `linear-gradient(90deg,${C.blue},${C.gold})`, borderRadius: 4 }} />
                      </div>
                    </div>
                  );
                });
              })()}
            </div>

            <div style={G.card}>
              <div style={G.sectionTitle}>💚 Subventions écoénergétiques disponibles</div>
              <div style={{ display: "grid", gap: 10 }}>
                {SUBVENTIONS.map(s => (
                  <div key={s.nom} style={{ background: C.surface2, borderRadius: 8, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                    <div>
                      <div style={{ fontSize: 14, color: C.text }}>{s.nom}</div>
                      <div style={{ fontSize: 11, color: C.textMuted, fontFamily: "monospace", marginTop: 2 }}>{s.org}</div>
                    </div>
                    <span style={{ color: C.green, fontSize: 15, fontWeight: "bold" }}>{s.montant}</span>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        {/* ═══ FISCAL ═══ */}
        {tab === "fiscal" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(170px,1fr))", gap: 12, marginBottom: 20 }}>
              <StatCard label="Taxes municipales / an" value={fmt(taxesAhuntsic.municipal)} color={C.orange} />
              <StatCard label="Taxe scolaire / an" value={fmt(taxesAhuntsic.scolaire)} color={C.blue} />
              <StatCard label="Total taxes / an" value={fmt(taxesAhuntsic.total)} color={C.gold} />
              <StatCard label="Déductible 50% locatif" value={fmt(taxesAhuntsic.totalDed)} color={C.green} />
              <StatCard label="Déductions dépenses / an" value={fmt(fiscal.deductible)} color={C.purple} />
              <StatCard label="Taxe de bienvenue" value={fmt(taxeBienvenue)} color={C.red} />
            </div>

            <div style={G.card}>
              <div style={G.sectionTitle}>🧾 Déductions fiscales — Logement locatif</div>
              <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 14 }}>Comme propriétaire-occupant d'un duplex, vous pouvez déduire <strong style={{ color: C.gold }}>50%</strong> des dépenses liées à l'immeuble sur votre déclaration de revenus.</div>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr><th style={G.th}>Dépense</th><th style={G.th}>Annuel</th><th style={G.th}>50% déductible</th></tr></thead>
                <tbody>
                  {budget.depenses.map(d => (
                    <tr key={d.id}>
                      <td style={G.td}>{d.label}</td>
                      <td style={G.td}>{fmt(d.montant * 12)}</td>
                      <td style={{ ...G.td, color: C.green }}>{fmt(d.montant * 12 * 0.5)}</td>
                    </tr>
                  ))}
                  <tr>
                    <td style={{ ...G.td, fontWeight: "bold", color: C.gold }}>TOTAL</td>
                    <td style={{ ...G.td, fontWeight: "bold" }}>{fmt(fiscal.depAn)}</td>
                    <td style={{ ...G.td, fontWeight: "bold", color: C.green }}>{fmt(fiscal.deductible)}</td>
                  </tr>
                </tbody>
              </table>
              <div style={{ marginTop: 10, fontSize: 12, color: C.textMuted, background: C.surface2, borderRadius: 7, padding: "10px 14px" }}>
                💡 Les travaux et rénovations sur la partie locative sont également déductibles. Consultez un comptable pour l'amortissement vs dépense courante.
              </div>
            </div>

            <div style={G.card}>
              <div style={G.sectionTitle}>🏛 Taxe de bienvenue — Valeur marchande: {fmt(hyp.valeurMarchande)}</div>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr><th style={G.th}>Tranche</th><th style={G.th}>Taux</th></tr></thead>
                <tbody>
                  {[["0 $ — 58 900 $", "0,5%"], ["58 901 $ — 294 000 $", "1,0%"], ["294 001 $ — 500 000 $", "1,5%"], ["500 001 $ — 1 000 000 $", "2,0%"], ["> 1 000 000 $", "2,5%"]].map(([t, r]) => (
                    <tr key={t}><td style={G.td}>{t}</td><td style={G.td}>{r}</td></tr>
                  ))}
                </tbody>
              </table>
              <div style={{ marginTop: 14, padding: "14px 18px", background: `${C.orange}10`, border: `1px solid ${C.orange}30`, borderRadius: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ color: C.textMuted }}>Montant estimé pour votre duplex</span>
                <span style={{ fontSize: 22, color: C.orange }}>{fmt(taxeBienvenue)}</span>
              </div>
              <div style={{ marginTop: 8, fontSize: 12, color: C.textMuted }}>Note: Montréal peut imposer une taxe additionnelle sur les immeubles {">"} 500 000 $. Vérifiez avec votre notaire.</div>
            </div>

            {/* Taxes Ahuntsic réelles */}
            <div style={G.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div style={G.sectionTitle}>🏛 Taxes Ahuntsic-Cartierville 2025 — Valeur: {fmt(hyp.valeurMarchande)}</div>
                <span style={{ fontSize: 11, color: C.textMuted, fontFamily: "monospace" }}>Taux officiels Ville de Montréal</span>
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr><th style={G.th}>Composante</th><th style={G.th}>Taux ($/100$)</th><th style={G.th}>Montant / an</th><th style={G.th}>/ mois</th></tr></thead>
                <tbody>
                  {[
                    ["Taxe foncière générale",         "0,4638", taxesAhuntsic.fonciere],
                    ["Taxe ARTM (transports)",         "0,0072", taxesAhuntsic.artm],
                    ["Taxe voirie",                    "0,0024", taxesAhuntsic.voirie],
                    ["Arrondissement — services",      "0,0422", taxesAhuntsic.services],
                    ["Arrondissement — investissements","0,0306", taxesAhuntsic.invest],
                  ].map(([l, t, v]) => (
                    <tr key={l}>
                      <td style={G.td}>{l}</td>
                      <td style={{ ...G.td, fontFamily: "monospace", fontSize: 12, color: C.textMuted }}>{t}</td>
                      <td style={G.td}>{fmt(v)}</td>
                      <td style={{ ...G.td, color: C.textMuted, fontSize: 12 }}>{fmt(v / 12)}</td>
                    </tr>
                  ))}
                  <tr style={{ borderTop: `2px solid ${C.border}` }}>
                    <td style={{ ...G.td, fontWeight: "bold", color: C.gold }}>Sous-total municipal</td>
                    <td style={{ ...G.td, fontFamily: "monospace", fontSize: 12, color: C.textMuted }}>0,5462</td>
                    <td style={{ ...G.td, fontWeight: "bold", color: C.gold }}>{fmt(taxesAhuntsic.municipal)}</td>
                    <td style={{ ...G.td, color: C.gold, fontSize: 12 }}>{fmt(taxesAhuntsic.municipal / 12)}</td>
                  </tr>
                  <tr>
                    <td style={G.td}>Taxe scolaire 2025-2026 <span style={{ fontSize: 11, color: C.textMuted }}>(exemption 25 000 $)</span></td>
                    <td style={{ ...G.td, fontFamily: "monospace", fontSize: 12, color: C.textMuted }}>0,08423</td>
                    <td style={G.td}>{fmt(taxesAhuntsic.scolaire)}</td>
                    <td style={{ ...G.td, color: C.textMuted, fontSize: 12 }}>{fmt(taxesAhuntsic.scolaire / 12)}</td>
                  </tr>
                  <tr style={{ borderTop: `2px solid ${C.border}`, background: `${C.gold}08` }}>
                    <td style={{ ...G.td, fontWeight: "bold", fontSize: 15, color: C.gold }}>TOTAL TAXES</td>
                    <td style={G.td}></td>
                    <td style={{ ...G.td, fontWeight: "bold", fontSize: 18, color: C.gold }}>{fmt(taxesAhuntsic.total)}</td>
                    <td style={{ ...G.td, color: C.gold }}>{fmt(taxesAhuntsic.total / 12)}</td>
                  </tr>
                </tbody>
              </table>
              <div style={{ marginTop: 10, fontSize: 12, color: C.textMuted, background: C.surface2, borderRadius: 7, padding: "10px 14px" }}>
                ⚠️ Calculé sur la valeur marchande. La Ville taxe selon la <strong>valeur au rôle d'évaluation</strong>, qui peut différer. Le nouveau rôle 2026-2027-2028 est en vigueur depuis septembre 2025.
              </div>
            </div>

            {/* 50% locatif */}
            <div style={{ ...G.card, borderColor: `${C.green}30` }}>
              <div style={G.sectionTitle}>🏠 Déduction 50% — Logement locatif</div>
              <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 16 }}>
                Vous habitez un logement et louez l'autre : <strong style={{ color: C.gold }}>50% des taxes</strong> sont déductibles comme dépense de location (annexe L au Québec, T776 au fédéral).
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 16 }}>
                <thead><tr><th style={G.th}>Taxe</th><th style={G.th}>Total annuel</th><th style={G.th}>Votre part (50%)</th><th style={G.th}>Part déductible (50%)</th></tr></thead>
                <tbody>
                  <tr>
                    <td style={G.td}>Taxes municipales</td>
                    <td style={G.td}>{fmt(taxesAhuntsic.municipal)}</td>
                    <td style={G.td}>{fmt(taxesAhuntsic.municipal * 0.5)}</td>
                    <td style={{ ...G.td, color: C.green }}>{fmt(taxesAhuntsic.municipalDed)}</td>
                  </tr>
                  <tr>
                    <td style={G.td}>Taxe scolaire</td>
                    <td style={G.td}>{fmt(taxesAhuntsic.scolaire)}</td>
                    <td style={G.td}>{fmt(taxesAhuntsic.scolaire * 0.5)}</td>
                    <td style={{ ...G.td, color: C.green }}>{fmt(taxesAhuntsic.scolaireDed)}</td>
                  </tr>
                  <tr style={{ borderTop: `2px solid ${C.border}` }}>
                    <td style={{ ...G.td, fontWeight: "bold", color: C.gold }}>TOTAL</td>
                    <td style={{ ...G.td, fontWeight: "bold" }}>{fmt(taxesAhuntsic.total)}</td>
                    <td style={{ ...G.td, fontWeight: "bold" }}>{fmt(taxesAhuntsic.total * 0.5)}</td>
                    <td style={{ ...G.td, fontWeight: "bold", color: C.green }}>{fmt(taxesAhuntsic.totalDed)}</td>
                  </tr>
                </tbody>
              </table>
              <div style={G.sectionTitle}>💰 Économie d'impôt estimée sur les taxes seules</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                {[
                  ["Taux 37%", "Revenus ~80 000 $", taxesAhuntsic.eco37, C.blue],
                  ["Taux 45%", "Revenus ~110 000 $", taxesAhuntsic.eco45, C.purple],
                  ["Taux 53%", "Revenus ~160 000 $+", taxesAhuntsic.eco53, C.green],
                ].map(([t, r, v, c]) => (
                  <div key={t} style={{ background: C.surface2, borderRadius: 8, padding: "12px 14px", textAlign: "center" }}>
                    <div style={{ fontSize: 11, color: C.textMuted, fontFamily: "monospace" }}>{t}</div>
                    <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6 }}>{r}</div>
                    <div style={{ fontSize: 20, color: c, fontWeight: "bold" }}>{fmt(v)}</div>
                    <div style={{ fontSize: 11, color: C.textMuted }}>économisé / an</div>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 12, fontSize: 12, color: C.textMuted, background: C.surface2, borderRadius: 7, padding: "10px 14px" }}>
                💡 Ces économies s'appliquent aux taxes seulement. En ajoutant les intérêts hypothécaires, l'assurance et l'entretien (tous déductibles à 50%), l'économie fiscale totale est significativement plus élevée.
              </div>
            </div>

            <div style={G.card}>
              <div style={G.sectionTitle}>📅 Calendrier fiscal</div>
              {[
                ["8 juin 2026",       "🔑 Acte de vente chez le notaire — Duplex Ahuntsic"],
                ["1er août 2026",     "🏠 Entrée de Lya Véga Marcotte — Logement du haut"],
                ["30 avril",          "Date limite déclaration de revenus (particuliers)"],
                ["15 juin",           "Date limite si travailleur autonome"],
                ["31 mars",           "Avis de renouvellement bail (3 mois avant fin)"],
                ["Janvier / Juillet", "Taxes municipales — 2 versements"],
                ["Automne",           "Taxes scolaires — 1 versement"],
              ].map(([d, l]) => (
                <div key={l} style={{ display: "flex", gap: 14, padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ color: C.gold, fontFamily: "monospace", fontSize: 12, minWidth: 120, paddingTop: 2 }}>{d}</span>
                  <span style={{ fontSize: 13, color: C.textDim }}>{l}</span>
                </div>
              ))}
            </div>
          </>
        )}

        {/* ═══ DOCUMENTS ═══ */}
        {tab === "documents" && (
          <>
            <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
              <button style={G.btnGold} onClick={() => setSDF(!showDF)}>{showDF ? "Annuler" : "+ Ajouter un document"}</button>
            </div>
            {showDF && (
              <div style={{ ...G.card, borderColor: `${C.gold}44`, marginBottom: 16 }}>
                <div style={G.sectionTitle}>Nouveau document</div>
                <div style={{ ...G.grid2, marginBottom: 12 }}>
                  <Inp label="Nom du document *" value={newDoc.nom} onChange={v => setND(p => ({ ...p, nom: v }))} />
                  <Sel label="Type" value={newDoc.type} onChange={v => setND(p => ({ ...p, type: v }))} options={["Bail", "Assurance", "Légal", "Inspection", "Garantie", "Permis", "Autre"]} />
                  <Inp label="Date d'expiration" type="date" value={newDoc.dateExpiration} onChange={v => setND(p => ({ ...p, dateExpiration: v }))} />
                  <div style={{ display: "flex", alignItems: "center", gap: 10, paddingTop: 22 }}>
                    <input type="checkbox" checked={newDoc.alerte} onChange={e => setND(p => ({ ...p, alerte: e.target.checked }))} id="alertD" />
                    <label htmlFor="alertD" style={{ fontSize: 13, color: C.textDim, cursor: "pointer" }}>Alerte 90 jours avant expiration</label>
                  </div>
                </div>
                <div style={{ marginBottom: 12 }}>
                  <label style={G.label}>Notes</label>
                  <textarea style={{ ...G.input, height: 60, resize: "vertical" }} value={newDoc.notes} onChange={e => setND(p => ({ ...p, notes: e.target.value }))} />
                </div>
                <button style={G.btnGold} onClick={addDoc}>Enregistrer</button>
              </div>
            )}
            <div style={G.card}>
              {docs.map(d => {
                const j = daysUntil(d.dateExpiration);
                const alerte = d.alerte && j !== null && j <= 90 && j >= 0;
                return (
                  <div key={d.id} style={{ borderBottom: `1px solid ${C.border}`, padding: "14px 0", display: "grid", gridTemplateColumns: "1fr auto", gap: 8 }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                        <span style={{ fontSize: 15, fontWeight: "bold", color: alerte ? C.orange : C.text }}>{d.nom}</span>
                        <span style={G.badge(C.blue)}>{d.type}</span>
                        {alerte && <span style={G.badge(C.orange)}>⚠ {j}j restants</span>}
                        {d.dateExpiration && !alerte && j !== null && <span style={{ fontSize: 11, color: C.textMuted, fontFamily: "monospace" }}>expire {d.dateExpiration}</span>}
                        {!d.dateExpiration && <span style={{ fontSize: 11, color: C.textMuted }}>sans expiration</span>}
                      </div>
                      {d.notes && <div style={{ fontSize: 12, color: C.textMuted, fontStyle: "italic" }}>{d.notes}</div>}
                    </div>
                    <button style={G.btnDanger} onClick={() => setDocs(p => p.filter(x => x.id !== d.id))}>×</button>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* ═══ OFFRES ═══ */}
        {tab === "offres" && (
          <>
            <div style={{ ...G.card, borderColor: `${C.gold}30`, background: `${C.gold}06`, marginBottom: 16, padding: "12px 18px" }}>
              <span style={{ color: C.gold }}>💡 </span>
              <span style={{ color: C.textMuted, fontSize: 13 }}>Tarifs estimés pour Ahuntsic, Montréal. Vérifiez toujours directement avec le fournisseur.</span>
            </div>
            {OFFRES.map(bloc => {
              const sorted = [...bloc.items].sort((a, b) => a.prix - b.prix);
              const saving = sorted[sorted.length - 1].prix - sorted[0].prix;
              return (
                <div key={bloc.cat} style={G.card}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                    <div style={G.sectionTitle}>{bloc.cat}</div>
                    {saving > 0 && <span style={{ fontSize: 12, color: C.green, fontFamily: "monospace" }}>Économie possible: {fmt(saving)}/mois</span>}
                  </div>
                  {sorted.map((f, i) => (
                    <div key={f.nom} style={{ padding: "12px 14px", marginBottom: 6, borderRadius: 8, background: i === 0 ? `${C.green}0c` : C.surface2, border: `1px solid ${i === 0 ? C.green + "40" : C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <span style={{ color: i === 0 ? C.green : C.text, fontWeight: i === 0 ? "bold" : "normal" }}>{i === 0 ? "🏆 " : ""}{f.nom}</span>
                        <div style={{ fontSize: 12, color: C.textMuted, marginTop: 3 }}>{f.detail}</div>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontSize: 20, color: i === 0 ? C.green : C.text }}>{fmt(f.prix)}</div>
                        <div style={{ fontSize: 11, color: C.textMuted, fontFamily: "monospace" }}>/mois</div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
          </>
        )}
      </div>

      {/* ── Modal Backup ── */}
      {showBackup && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, padding: 28, width: "100%", maxWidth: 600 }}>
            <div style={{ fontSize: 15, color: C.text, marginBottom: 6, fontWeight: "bold" }}>
              {backupText && backupText.startsWith("{") ? "📤 Exporter — Copiez ce texte" : "📥 Importer — Collez votre sauvegarde"}
            </div>
            <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 14 }}>
              {backupText && backupText.startsWith("{")
                ? "Sélectionnez tout (Ctrl+A), copiez (Ctrl+C) et gardez ce texte dans un fichier .txt ou .json."
                : "Collez ici le texte d'une sauvegarde précédemment exportée, puis cliquez Importer."}
            </div>
            <textarea
              style={{ ...G.input, height: 260, resize: "vertical", fontFamily: "monospace", fontSize: 11 }}
              value={backupText}
              onChange={e => setBackupText(e.target.value)}
              placeholder='Collez votre JSON ici...'
              spellCheck={false}
            />
            <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
              {backupText && backupText.startsWith("{") ? (
                <button style={G.btnGold} onClick={() => { navigator.clipboard?.writeText(backupText); setSavedMsg("✓ Copié!"); setTimeout(()=>setSavedMsg(""),2000); }}>
                  Copier tout
                </button>
              ) : (
                <button style={G.btnGold} onClick={importData}>Importer</button>
              )}
              <button style={{ ...G.btnGhost(false), marginLeft: "auto" }} onClick={() => { setShowBackup(false); setBackupText(""); }}>Fermer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DuplexApp, null));
</script>

<!-- Step 4: Fallback if Babel CDN fails - try alternate CDN -->
<script>
window.addEventListener('load', function() {
  setTimeout(function() {
    if (!document.querySelector('[data-babel-processed]') && 
        typeof Babel === 'undefined') {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js';
      s.onload = function() { Babel.transformScriptTags(); };
      document.head.appendChild(s);
    }
  }, 3000);
});
</script>

</body>
</html>
